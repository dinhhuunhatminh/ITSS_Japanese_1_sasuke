# ===============================
# DATABASE CONNECTION (MySQL)
# ===============================
# Lưu ý cổng 3307 là cổng mà chúng ta đã map trong Docker
spring.datasource.url=jdbc:mysql://localhost:3307/matching_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# "update" giúp Spring tự động tạo bảng trong DB nếu chưa có
spring.jpa.hibernate.ddl-auto=update
# Hiển thị câu lệnh SQL ra terminal để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# SERVER PORT
# ===============================
# Đổi cổng Backend chạy sang 8080 (hoặc cổng khác nếu bạn muốn)
server.port=8080