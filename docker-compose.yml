version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: matching_app_mysql
    restart: always
    environment:
      MYSQL_DATABASE: matching_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: